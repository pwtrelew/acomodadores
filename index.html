<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Acomodadores</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Acomodadores">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1048/1048953.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Tipografía Nativa de Apple */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Variables de Sistema iOS Calibradas (Light & Dark) */
        :root {
            --bg-base: #F2F2F7;
            --bg-card: #FFFFFF;
            --bg-saturday: #EAEAEF;
            --bg-input: rgba(255, 255, 255, 0.5);
            --text-main: #000000;
            --text-muted: #8E8E93;
            --border-color: rgba(60, 60, 67, 0.1);
            --separator-color: rgba(60, 60, 67, 0.15);
            --accent-blue: #007AFF;
            --action-sheet-bg: rgba(255, 255, 255, 0.75);
            --alert-bg: rgba(255, 255, 255, 0.85);
        }

        .dark {
            --bg-base: #000000;
            --bg-card: #1C1C1E;
            --bg-saturday: #2C2C2E;
            --bg-input: rgba(255, 255, 255, 0.08);
            --text-main: #FFFFFF;
            --text-muted: #EBEBF5;
            --border-color: rgba(84, 84, 88, 0.3);
            --separator-color: rgba(84, 84, 88, 0.3);
            --accent-blue: #0A84FF;
            --action-sheet-bg: rgba(30, 30, 30, 0.75);
            --alert-bg: rgba(30, 30, 30, 0.85);
        }

        /* Utilidades iOS Premium */
        .ios-large-title {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1.2;
        }

        .ios-card {
            border-radius: 24px;
            background: var(--bg-card);
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: 0.5px solid var(--border-color);
        }

        /* Animaciones Apple */
        @keyframes ios-spring-up {
            0% { transform: translateY(100%); }
            100% { transform: translateY(0); }
        }
        @keyframes ios-fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes ios-zoom-in {
            0% { opacity: 0; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        .animate-spring { animation: ios-spring-up 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards; }
        .animate-fade { animation: ios-fade-in 0.25s ease-out forwards; }
        .animate-alert { animation: ios-zoom-in 0.25s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        /* Bottom Drawer - Glassmorphism */
        .action-sheet-overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.3);
            display: flex; flex-direction: column; justify-content: flex-end;
        }
        
        .action-sheet {
            background: var(--action-sheet-bg);
            backdrop-filter: saturate(180%) blur(25px);
            -webkit-backdrop-filter: saturate(180%) blur(25px);
            border-radius: 32px 32px 0 0;
            overflow: hidden;
            padding-bottom: env(safe-area-inset-bottom);
            display: flex; flex-direction: column;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.15);
        }

        .action-sheet-btn {
            padding: 18px 24px; font-size: 17px; font-weight: 400;
            color: var(--text-main);
            background: transparent; border: none;
            border-bottom: 0.5px solid var(--separator-color);
            transition: background 0.15s ease;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer;
        }
        .action-sheet-btn:active { background: rgba(0,0,0,0.1); }
        .dark .action-sheet-btn:active { background: rgba(255,255,255,0.1); }
        .action-sheet-btn:last-child { border-bottom: none; }

        .ios-cell-button {
            width: 100%; text-align: left;
            background: var(--bg-input);
            color: var(--text-main);
            font-weight: 500; padding: 12px 14px;
            border-radius: 14px; font-size: 13px;
            min-height: 44px;
            border: 0.5px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
            transition: transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.15s;
            cursor: pointer;
        }
        .ios-cell-button:active { transform: scale(0.95); opacity: 0.6; }

        /* Replica de UIAlertController */
        .ios-alert {
            background: var(--alert-bg);
            backdrop-filter: saturate(180%) blur(25px);
            -webkit-backdrop-filter: saturate(180%) blur(25px);
            border-radius: 14px;
            width: 270px;
            text-align: center;
            display: flex; flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .ios-alert-content { padding: 20px 16px 16px; }
        .ios-alert-title { font-size: 17px; font-weight: 600; color: var(--text-main); margin-bottom: 4px; }
        .ios-alert-text { font-size: 13px; font-weight: 400; color: var(--text-main); line-height: 1.3; }
        .ios-alert-btn {
            font-size: 17px; font-weight: 600; color: var(--accent-blue);
            background: transparent; border-top: 0.5px solid var(--separator-color);
            padding: 12px; width: 100%; transition: background 0.15s ease;
            cursor: pointer;
            border-left: none; border-right: none; border-bottom: none;
        }
        .ios-alert-btn:active { background: rgba(0,0,0,0.1); }
        .dark .ios-alert-btn:active { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDBdoOrYUZ-oy22g_Is2vw0kpEAaKVviRU",
            authDomain: "acomodadores-df8a5.firebaseapp.com",
            projectId: "acomodadores-df8a5",
            storageBucket: "acomodadores-df8a5.firebasestorage.app",
            messagingSenderId: "912664676824",
            appId: "1:912664676824:web:9c832aabc194e85b638aad"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);
            window.fb = { db, auth, doc, setDoc, getDoc, signInAnonymously, onAuthStateChanged };
            window.dispatchEvent(new Event('firebase-ready'));
        } catch (err) { console.error(err); }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Iconos Nativos SVG
        const Icon = ({ name, className }) => {
            const icons = {
                'sun': <><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/><circle cx="12" cy="12" r="4"/></>,
                'moon': <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>,
                'key': <><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></>,
                'chevrons-up-down': <><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></>,
                'check': <path d="M20 6 9 17l-5-5"/>
            };
            return icons[name] ? (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            ) : null;
        };

        const App = () => {
            const [currentMonthIndex, setCurrentMonthIndex] = useState(2); // Marzo 2026
            const year = 2026;
            const [schedules, setSchedules] = useState({});
            const [user, setUser] = useState(null);
            
            const [activeWarning, setActiveWarning] = useState(null);
            const [theme, setTheme] = useState('light');
            
            const [pickerConfig, setPickerConfig] = useState({ isOpen: false, dateKey: null, field: null, options: [], currentValue: '' });
            
            const initialLoadDone = useRef(false);
            const schedulesRef = useRef(schedules);

            const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            const keyHolders = ["Esteban", "Jorge", "Ramón S", "Miguel", "Pablo"];
            const restrictedUsers = ["Atilio", "José", "Ramón Perales"];
            const allNames = ["Atilio", "Diego", "Esteban", "Jeremias", "Jorge", "José", "Luis", "Miguel", "Pablo", "Ramón Perales", "Ramón S"].sort();
            const baseAuditorioOptions = allNames.filter(n => !["Atilio", "Ramón Perales", "José"].includes(n));

            // Detector de tema nativo
            useEffect(() => {
                const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                setTheme(isDark ? 'dark' : 'light');
            }, []);

            useEffect(() => { document.documentElement.className = theme; }, [theme]);

            const toggleTheme = () => setTheme(prev => prev === 'light' ? 'dark' : 'light');

            // Autenticación Firebase
            useEffect(() => {
                const initSync = async () => {
                    if (!window.fb) return;
                    try {
                        const { auth, signInAnonymously, onAuthStateChanged } = window.fb;
                        await signInAnonymously(auth);
                        onAuthStateChanged(auth, (u) => {
                            setUser(u);
                            if (u) loadData(currentMonthIndex);
                        });
                    } catch (e) {
                        console.error(e);
                    }
                };
                if (window.fb) initSync();
                else window.addEventListener('firebase-ready', initSync);
                return () => window.removeEventListener('firebase-ready', initSync);
            }, [currentMonthIndex]);

            // Carga de datos
            const loadData = async (mIdx) => {
                initialLoadDone.current = false; 
                const { db, getDoc, doc } = window.fb;
                const docId = `${months[mIdx]}_${year}`;
                try {
                    const docRef = doc(db, 'artifacts', 'acomodadores-df8a5', 'public', 'data', 'calendarios', docId);
                    const snap = await getDoc(docRef);
                    if (snap.exists()) {
                        setSchedules(snap.data().schedules || {});
                        schedulesRef.current = snap.data().schedules || {};
                    } else {
                        setSchedules({});
                        schedulesRef.current = {};
                    }
                } catch (e) { console.error(e); }
                setTimeout(() => initialLoadDone.current = true, 500); 
            };

            // Autoguardado invisible
            useEffect(() => {
                if (!initialLoadDone.current || !user) return;
                if (JSON.stringify(schedules) === JSON.stringify(schedulesRef.current)) return;

                const timeoutId = setTimeout(async () => {
                    const { db, setDoc, doc } = window.fb;
                    const docId = `${months[currentMonthIndex]}_${year}`;
                    try {
                        const docRef = doc(db, 'artifacts', 'acomodadores-df8a5', 'public', 'data', 'calendarios', docId);
                        await setDoc(docRef, { schedules, updatedAt: new Date().toISOString() });
                        schedulesRef.current = schedules; 
                    } catch (e) {
                        console.error("Auto-save error", e);
                    }
                }, 1500);

                return () => clearTimeout(timeoutId);
            }, [schedules, currentMonthIndex, user]);

            const currentMonthDays = useMemo(() => {
                const days = [];
                const date = new Date(year, currentMonthIndex, 1);
                while (date.getMonth() === currentMonthIndex) {
                    const dw = date.getDay(); 
                    if (dw === 4 || dw === 6) {
                        days.push({
                            dayNum: date.getDate(),
                            short: dw === 4 ? "JUE" : "SÁB",
                            fullDate: `${year}-${currentMonthIndex + 1}-${date.getDate()}`,
                            isThursday: dw === 4
                        });
                    }
                    date.setDate(date.getDate() + 1);
                }
                return days;
            }, [currentMonthIndex]);

            const openPicker = (dateKey, field, isThursday) => {
                let options = [];
                if (field === 'month') {
                    options = months;
                } else if (field === 'auditorio') {
                    options = ['—', ...(isThursday ? baseAuditorioOptions.filter(n => n !== "Luis") : baseAuditorioOptions)];
                } else {
                    options = ['—', ...(isThursday ? allNames.filter(n => !["José", "Luis"].includes(n)) : allNames)];
                }

                setPickerConfig({
                    isOpen: true,
                    dateKey,
                    field,
                    options,
                    currentValue: field === 'month' ? months[currentMonthIndex] : (schedules[dateKey]?.[field] || '')
                });
            };

            const handleSelectFromPicker = (opt) => {
                if (pickerConfig.field === 'month') {
                    const newIndex = months.indexOf(opt);
                    if (newIndex !== -1) setCurrentMonthIndex(newIndex);
                    setPickerConfig(prev => ({ ...prev, isOpen: false }));
                    return;
                }

                const finalVal = opt === '—' ? '' : opt;
                const { dateKey, field } = pickerConfig;
                const updated = { ...schedules, [dateKey]: { ...(schedules[dateKey] || {}), [field]: finalVal } };
                setSchedules(updated);
                setPickerConfig(prev => ({ ...prev, isOpen: false }));
                
                // Validación de Reglas
                const msgs = [];
                const aud = updated[dateKey].auditorio;
                const ent = updated[dateKey].entrada;

                if (aud && ent && !keyHolders.includes(aud) && !keyHolders.includes(ent)) msgs.push("Falta personal con llave.");
                if ((aud === "Atilio" && ent === "Ramón Perales") || (aud === "Ramón Perales" && ent === "Atilio")) msgs.push("Atilio y R. Perales no pueden estar juntos.");
                
                restrictedUsers.forEach(u => {
                    let count = 0;
                    currentMonthDays.forEach(d => {
                        const data = updated[d.fullDate];
                        if (data?.auditorio === u || data?.entrada === u) count++;
                    });
                    if (count > 1 && (aud === u || ent === u)) msgs.push(`${u} no puede estar dos veces en el mes.`);
                });
                
                if (aud === "José" || ent === "José") {
                    const checkMonth = (idx) => {
                        if (idx < 0 || idx > 11) return false;
                        const date = new Date(year, idx, 1);
                        while (date.getMonth() === idx) {
                            const k = `${year}-${idx+1}-${date.getDate()}`;
                            if (updated[k]?.auditorio === "José" || updated[k]?.entrada === "José") return true;
                            date.setDate(date.getDate() + 1);
                        }
                        return false;
                    };
                    if (checkMonth(currentMonthIndex - 1) || checkMonth(currentMonthIndex + 1)) msgs.push("José no puede estar dos meses seguidos.");
                }
                if (msgs.length > 0) setActiveWarning([msgs[0]]);
            };

            return (
                <div className="max-w-[428px] mx-auto px-5 pt-8 pb-12 animate-fade">
                    
                    {/* Header iOS Minimalista */}
                    <div className="flex justify-between items-center mb-8">
                        <h1 className="ios-large-title">Acomodadores</h1>
                        <button onClick={toggleTheme} className="p-2 rounded-full bg-[var(--bg-secondary)] text-[var(--text-main)] active:scale-90 transition-transform cursor-pointer">
                            <Icon name={theme === 'dark' ? 'sun' : 'moon'} className="w-5 h-5" />
                        </button>
                    </div>

                    {/* Planilla / Contenedor Inset Grouped */}
                    <div className="ios-card overflow-hidden pb-4">
                        <div className="px-4 py-6 text-center border-b border-[var(--border-color)]">
                             <button 
                               onClick={() => openPicker(null, 'month', false)} 
                               className="inline-flex items-center justify-center gap-1.5 active:opacity-50 transition-opacity cursor-pointer bg-transparent border-none p-0 m-0"
                             >
                               <h2 className="text-[22px] font-semibold tracking-tight text-[var(--text-main)] m-0">{months[currentMonthIndex]}</h2>
                               <Icon name="chevrons-up-down" className="w-4 h-4 text-[var(--text-muted)]" />
                             </button>
                        </div>

                        <div className="px-4 mt-2">
                            <table className="w-full border-separate border-spacing-y-2">
                                <thead>
                                    <tr className="text-[var(--text-main)] font-semibold uppercase tracking-wide text-[11px]">
                                        <th className="py-2 text-center w-[20%] font-semibold">DÍA</th>
                                        <th className="py-2 text-center w-[40%] font-semibold">AUDITORIO</th>
                                        <th className="py-2 text-center w-[40%] font-semibold">ENTRADA</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {currentMonthDays.map((day) => {
                                        const accent = day.isThursday ? "var(--text-main)" : "var(--accent-blue)";
                                        const rowBg = day.isThursday ? "transparent" : "var(--bg-saturday)";

                                        return (
                                            <tr key={day.fullDate} style={{ backgroundColor: rowBg, borderRadius: '16px' }}>
                                                <td className={`py-1 pr-1 ${!day.isThursday ? "rounded-l-[16px]" : ""}`}>
                                                    <div className="flex flex-col items-center justify-center min-w-[62px] py-1.5 rounded-[12px] bg-[var(--bg-card)] border border-[var(--border-color)] shadow-sm">
                                                        <span className="text-[9px] font-bold tracking-wide" style={{ color: accent }}>{day.short}</span>
                                                        <span className="text-[22px] font-semibold leading-none tracking-tight" style={{ color: accent, marginTop: '2px' }}>{day.dayNum}</span>
                                                    </div>
                                                </td>
                                                <td className="py-1 px-1">
                                                    <button 
                                                        onClick={() => openPicker(day.fullDate, 'auditorio', day.isThursday)}
                                                        className="ios-cell-button"
                                                    >
                                                        <span className="truncate">{schedules[day.fullDate]?.auditorio || '—'}</span>
                                                        <Icon name="chevrons-up-down" className="w-3.5 h-3.5 text-[var(--text-muted)] opacity-50 shrink-0" />
                                                    </button>
                                                </td>
                                                <td className={`py-1 px-1 ${!day.isThursday ? "rounded-r-[16px]" : ""}`}>
                                                    <button 
                                                        onClick={() => openPicker(day.fullDate, 'entrada', day.isThursday)}
                                                        className="ios-cell-button"
                                                    >
                                                        <span className="truncate">{schedules[day.fullDate]?.entrada || '—'}</span>
                                                        <Icon name="chevrons-up-down" className="w-3.5 h-3.5 text-[var(--text-muted)] opacity-50 shrink-0" />
                                                    </button>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* ACTION SHEET (Panel Deslizante) */}
                    {pickerConfig.isOpen && (
                        <div className="action-sheet-overlay animate-fade">
                            <div className="absolute inset-0" onClick={() => setPickerConfig(prev => ({...prev, isOpen: false}))}></div>
                            
                            <div className="action-sheet animate-spring relative z-10 mx-2">
                                <div className="w-full flex justify-center pt-3 pb-1">
                                    <div className="w-10 h-1.5 rounded-full bg-gray-400/50"></div>
                                </div>

                                <div className="max-h-[60vh] overflow-y-auto flex flex-col mt-2 pb-4">
                                    {pickerConfig.options.map(opt => {
                                        const displayVal = pickerConfig.currentValue === '' ? '—' : pickerConfig.currentValue;
                                        const isSelected = displayVal === opt;
                                        const hasKey = (pickerConfig.field === 'auditorio' || pickerConfig.field === 'entrada') && keyHolders.includes(opt);

                                        return (
                                            <button 
                                                key={opt} 
                                                className="action-sheet-btn"
                                                onClick={() => handleSelectFromPicker(opt)}
                                            >
                                                <div className="flex items-center gap-2">
                                                    <span style={{ fontWeight: isSelected ? '600' : '400', color: isSelected ? 'var(--accent-blue)' : 'var(--text-main)' }}>{opt}</span>
                                                    {hasKey && <Icon name="key" className="w-3.5 h-3.5 text-[var(--accent-blue)] opacity-80" />}
                                                </div>
                                                {isSelected && <Icon name="check" className="w-5 h-5 text-[var(--accent-blue)]" />}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ALERT (Aviso Nativo) */}
                    {activeWarning && (
                        <div className="fixed inset-0 z-[600] flex items-center justify-center p-8 bg-black/30 animate-fade">
                            <div className="ios-alert animate-alert">
                                <div className="ios-alert-content">
                                    <h3 className="ios-alert-title">Aviso</h3>
                                    <p className="ios-alert-text">{activeWarning[0]}</p>
                                </div>
                                <button onClick={() => setActiveWarning(null)} className="ios-alert-btn">
                                    OK
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
